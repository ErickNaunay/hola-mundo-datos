services:
  data-warehouse:
    image: postgres:13
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=warehouse
    volumes:
      - warehouse-volume:/var/lib/postgressql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d warehouse"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 5s
  ingesta-datos:
    image: ingesta-datos
    build: .
    depends_on:
      data-warehouse:
        condition: service_healthy
volumes:
  warehouse-volume: